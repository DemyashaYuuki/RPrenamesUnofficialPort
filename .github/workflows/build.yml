name: Build RP Renames Port

on:
  workflow_dispatch:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - minecraft_version: '1.21.10'
            yarn_mappings: '1.21.10+build.3'
            minecraft_version_dependency: '~1.21.10'
            fabric_version: '0.138.4+1.21.10'
          - minecraft_version: '1.21.11'
            yarn_mappings: '1.21.11+build.4'
            minecraft_version_dependency: '~1.21.11'
            fabric_version: '0.141.3+1.21.11'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle 9.2.0
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.2.0'

      - name: Configure target versions
        shell: bash
        run: |
          sed -i "s/^minecraft_version=.*/minecraft_version=${{ matrix.minecraft_version }}/" gradle.properties
          sed -i "s/^yarn_mappings=.*/yarn_mappings=${{ matrix.yarn_mappings }}/" gradle.properties
          sed -i "s/^minecraft_version_dependency=.*/minecraft_version_dependency=${{ matrix.minecraft_version_dependency }}/" gradle.properties
          sed -i "s/^fabric_version=.*/fabric_version=${{ matrix.fabric_version }}/" gradle.properties
          cat gradle.properties

      - name: Build
        run: gradle build --stacktrace

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rprenames-${{ matrix.minecraft_version }}
          path: build/libs/*.jar
